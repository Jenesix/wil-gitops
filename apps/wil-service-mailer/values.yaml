image:
  repository: harbor.wil.phraya.net/wil/wil-service-mailer
  tag: "latest"
  pullSecrets: harbor-registry-secret

service:
  namespace: wil-dev
  replicas: 1
  port: 6701
  healthCheckPath: /health

resources:
  requests:
    memory: "128Mi"
    cpu: "10m"
  limits:
    memory: "256Mi"
    cpu: "500m"

ingress:
  host: ""
  path: /mailer(/|$)(.*)
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/rewrite-target: /$2

extraEnv:
  COMMIT_ID: ""
  NODE_ENV: development
  REDIS_URL: ""
  REDIS_PASSWORD: ""
  SMTP_HOST: ""
  SMTP_PORT: "587"
  SMTP_SECURE: "true"
  SMTP_USER: ""
  SMTP_PASS: ""
  FROM_EMAIL: ""
  EMAIL_RATE_LIMIT: "19"
  EMAIL_RATE_DURATION: "3600000"
