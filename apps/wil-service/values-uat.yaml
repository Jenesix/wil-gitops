image:
  tag: "uat-ba0a232c"
service:
  namespace: wil-uat
  replicas: 2
ingress:
  host: uat.wil.phraya.net
extraEnv:
  COMMIT_ID: "ba0a232c"
  NODE_ENV: production
  DB_HOST: "postgresql.wil-uat.svc.cluster.local"
extraEnvSecrets:
  DB_USER:
    secretName: wil-service-secret
    key: DB_USER
  DB_PASSWORD:
    secretName: wil-service-secret
    key: DB_PASSWORD
  JWT_SECRET:
    secretName: wil-service-secret
    key: JWT_SECRET
