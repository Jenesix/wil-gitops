expose:
  type: ingress
  tls:
    enabled: true
    certSource: secret
    secret:
      secretName: harbor-tls-cert
  ingress:
    hosts:
      core: harbor.wil.phraya.net
    className: nginx
    annotations:
      kubernetes.io/ingress.class: nginx
      nginx.ingress.kubernetes.io/proxy-body-size: "0"
      cert-manager.io/cluster-issuer: letsencrypt-prod
    tls:
      - secretName: harbor-tls-cert
        hosts:
          - harbor.wil.phraya.net

internal_tls:
  enabled: false

externalURL: https://harbor.wil.phraya.net

jobservice:
  readinessProbe:
    initialDelaySeconds: 60
    periodSeconds: 15
    failureThreshold: 10
    timeoutSeconds: 5
  livenessProbe:
    initialDelaySeconds: 300
    periodSeconds: 20
    failureThreshold: 5
  resources:
    requests:
      memory: "256Mi"
      cpu: "50m"
    limits:
      memory: "512Mi"
      cpu: "500m"

persistence:
  enabled: true
  persistentVolumeClaim:
    registry:
      storageClass: "standard-rwo"
      size: 20Gi
    jobservice:
      storageClass: "standard-rwo"
      size: 1Gi
    database:
      storageClass: "standard-rwo"
      size: 1Gi
    redis:
      storageClass: "standard-rwo"
      size: 1Gi

harborAdminPassword: ""
existingSecretAdminPassword: "harbor-admin-secret"
existingSecretAdminPasswordKey: "HARBOR_ADMIN_PASSWORD"

trivy:
  enabled: false

core:
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

portal:
  resources:
    requests:
      cpu: "10m"
      memory: "32Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

registry:
  resources:
    requests:
      cpu: "10m"
      memory: "64Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

database:
  internal:
    resources:
      requests:
        cpu: "20m"
        memory: "64Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

redis:
  internal:
    resources:
      requests:
        cpu: "10m"
        memory: "32Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"

trivy:
  enabled: false