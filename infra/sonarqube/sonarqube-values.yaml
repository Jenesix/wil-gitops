community:
  enabled: true

monitoringPasscodeSecretName: sonarqube-monitoring-passcode
monitoringPasscodeSecretKey: passcode

ingress:
  enabled: true
  hosts:
    - name: sonarqube.wil.phraya.net
      path: /
      pathType: Prefix
  tls:
    - secretName: sonarqube-tls
      hosts:
        - sonarqube.wil.phraya.net
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod

persistence:
  enabled: true
  size: 10Gi

resources:
  requests:
    memory: "512Mi"
    cpu: "50m"      # ← ลดจาก 100m
  limits:
    memory: "2Gi"
    cpu: "1000m"

postgresql:
  resources:
    requests:
      memory: "256Mi"
      cpu: "50m"    # ← ลดลง
    limits:
      memory: "512Mi"
      cpu: "500m"