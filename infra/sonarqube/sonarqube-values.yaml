monitoringPasscode: "my-secure-passcode"

ingress:
  enabled: true
  hosts:
    - name: sonarqube.wil.phraya.net
      path: /
      pathType: Prefix
  tls:
    - secretName: sonarqube-tls
      hosts:
        - sonarqube.wil.phraya.net
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod

persistence:
  enabled: true
  size: 10Gi

resources:
  limits:
    cpu: "1"
    memory: "2Gi"
  requests:
    cpu: "500m"
    memory: "1Gi"