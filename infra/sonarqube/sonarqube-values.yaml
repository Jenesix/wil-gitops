community:
  enabled: true

monitoringPasscodeSecretName: sonarqube-monitoring-passcode
monitoringPasscodeSecretKey: passcode

ingress:
  enabled: true
  hosts:
    - name: sonarqube.wil.phraya.net
      path: /
      pathType: Prefix
  tls:
    - secretName: sonarqube-tls
      hosts:
        - sonarqube.wil.phraya.net
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod

persistence:
  enabled: true
  size: 10Gi

resources:
  requests:
    cpu: "200m"
    memory: "2Gi"   # SonarQube ต้องการ minimum ~2Gi จริงๆ
  limits:
    cpu: "1000m"
    memory: "4Gi"

postgresql:
  resources:
    requests:
      cpu: "50m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# เพิ่ม JVM heap ให้ตรงกับ memory ที่ให้ด้วย
sonarProperties:
  sonar.web.javaOpts: "-Xmx1g -Xms512m"
  sonar.ce.javaOpts: "-Xmx1g -Xms512m"
  sonar.search.javaOpts: "-Xmx1g -Xms512m -XX:MaxDirectMemorySize=256m"