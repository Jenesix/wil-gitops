apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wil-service-mailer-uat
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jenesix/wil-gitops
    targetRevision: HEAD
    path: apps/wil-service-mailer
    helm:
      releaseName: wil-service-mailer-uat
      valueFiles:
        - values.yaml
        - values-uat.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: wil-uat
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
