apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wil-web-prd
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jenesix/wil-gitops
    targetRevision: HEAD
    path: apps/wil-web
    helm:
      releaseName: wil-web-prd
      valueFiles:
        - values.yaml
        - values-prd.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: wil-prd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
