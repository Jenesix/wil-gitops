apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wil-web-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jenesix/wil-gitops
    targetRevision: HEAD
    path: apps/wil-web
    helm:
      releaseName: wil-web-dev
      valueFiles:
        - values.yaml
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: wil-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
